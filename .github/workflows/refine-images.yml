name: Refine Image Artifacts (one-off)

# 일회용: 특정 글의 가짜 텍스트 박힌 본문 이미지 슬롯만 자연스러운 컷으로 재생성.
# schedule 없음, 수동 실행 전용. 작업 끝나면 비활성/삭제.

on:
  workflow_dispatch: {}

concurrency:
  group: refine-images-${{ github.repository }}
  cancel-in-progress: false

jobs:
  refine:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Create api-keys.txt from secrets
        run: |
          cat > api-keys.txt <<'EOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL=${{ secrets.ANTHROPIC_MODEL }}
          ANTHROPIC_REVIEW_MODEL=${{ secrets.ANTHROPIC_REVIEW_MODEL }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          IMAGEN_MODEL=${{ secrets.IMAGEN_MODEL }}
          SHOPIFY_STORE_URL=${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ADMIN_TOKEN=${{ secrets.SHOPIFY_ADMIN_TOKEN }}
          SHOPIFY_BLOG_HANDLE=${{ secrets.SHOPIFY_BLOG_HANDLE }}
          IMAGE_VARIANTS_PER_SLOT=${{ secrets.IMAGE_VARIANTS_PER_SLOT }}
          EOF
      - name: Run refine
        run: python src/refine_images.py
